<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>QBT 自定义价格段控盘取数</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="12" width="3.5" height="10" rx="1" fill="white" opacity="0.9"/>
          <rect x="7.5" y="6" width="3.5" height="16" rx="1" fill="white" opacity="0.95"/>
          <rect x="13" y="2" width="3.5" height="20" rx="1" fill="white"/>
          <rect x="18.5" y="9" width="3.5" height="13" rx="1" fill="white" opacity="0.85"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="title">QBT 控盘取数</h1>
        <span class="subtitle">品牌批量采集 · 全部 + 淘宝 + 天猫</span>
      </div>
      <button id="resetBtn" class="reset-btn" title="重置">↺</button>
    </div>

    <div class="section" id="brandSection">
      <div class="label-row">
        <label class="label" for="brandList"><span class="label-dot"></span>品牌列表</label>
        <span class="brand-count" id="brandCount"></span>
      </div>
      <textarea id="brandList" class="textarea" rows="7"
                placeholder="一行一个品牌，支持 Excel 直接粘贴&#10;按 Enter 开始采集 · Shift+Enter 换行"></textarea>
      <div id="brandStatusList" class="brand-status-list hidden"></div>
    </div>

    <div id="progressSection" class="section hidden">
      <div class="progress-info">
        <span class="progress-text" id="progressText">0 / 0</span>
        <span class="current-brand-name" id="currentBrandName"></span>
        <span class="current-channel-tag" id="currentChannelTag"></span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="actions">
      <button id="startBtn" class="btn btn-primary">开始采集</button>
      <button id="stopBtn" class="btn btn-danger hidden">停止</button>
      <button id="exportBtn" class="btn btn-success hidden">导出 CSV</button>
    </div>

    <div id="exportOptions" class="export-options hidden">
      <label class="unpivot-toggle">
        <input type="checkbox" id="unpivotCheck">
        <span class="toggle-label">逆透视（日期 → 行）</span>
      </label>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
